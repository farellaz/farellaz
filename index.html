<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Portofolio</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .project-item, .article-item {
      transition: all 0.7s ease;
      position: absolute;
      left: 50%;
      top: 50%;
    }

    /* POSITION BASIC */
    .pos-top { object-position: center top; }
    .pos-bottom { object-position: center bottom; }
    .pos-left { object-position: left center; }
    .pos-right { object-position: right center; }
    .pos-center { object-position: center; }

    /* POSITION VERTICAL CUSTOM */
    .pos-y-10 { object-position: center 10%; }
    .pos-y-15 { object-position: center 15%; }
    .pos-y-20 { object-position: center 20%; }
    .pos-y-25 { object-position: center 25%; }
    .pos-y-30 { object-position: center 30%; }
    .pos-y-35 { object-position: center 35%; }
    .pos-y-38 { object-position: center 38%; }
    .pos-y-40 { object-position: center 40%; }
    .pos-y-45 { object-position: center 45%; }
    .pos-y-50 { object-position: center 50%; }
    .pos-y-60 { object-position: center 60%; }
    .pos-y-70 { object-position: center 70%; }
    .pos-y-80 { object-position: center 80%; }

    /* POSITION HORIZONTAL CUSTOM */
    .pos-x-left { object-position: 25% center; }
    .pos-x-center { object-position: 50% center; }
    .pos-x-right { object-position: 75% center; }

    /* POSITION BOTH AXIS */
    .pos-left-top { object-position: 25% 20%; }
    .pos-left-middle { object-position: 25% 50%; }
    .pos-left-bottom { object-position: 25% 75%; }
    .pos-right-top { object-position: 75% 20%; }
    .pos-right-middle { object-position: 75% 50%; }
    .pos-right-bottom { object-position: 75% 75%; }
  </style>
</head>

<body class="bg-[#EEEEEE] text-[#222] font-sans">

<!-- NAVBAR -->
<nav class="fixed w-full bg-[#EEEEEE] border-b border-[#2FA084] z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 id="navbarTitle" class="text-xl font-bold text-[#2FA084]">MyPortfolio</h1>

    <ul class="hidden md:flex space-x-6">
      <li><a href="#home" class="hover:text-[#2FA084]">Home</a></li>
      <li><a href="#about" class="hover:text-[#2FA084]">About</a></li>
      <li><a href="#projects" class="hover:text-[#2FA084]">Projects</a></li>
      <li><a href="#articles" class="hover:text-[#2FA084]">Articles</a></li>
      <li><a href="#contact" class="hover:text-[#2FA084]">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<section id="home" class="h-screen flex items-center justify-center text-center px-4 pt-10">
  <div class="flex flex-col items-center">

    <img id="heroImage"
      src=""
      alt="Profile"
      class="w-[220px] h-[220px] rounded-full mb-5 mt-6 object-cover object-[center_15%] border-4 border-[#2FA084] shadow-lg">

    <h2 class="text-4xl md:text-6xl font-bold mb-3">
      Hi, I am <span id="heroName" class="text-[#2FA084]"></span>
    </h2>

    <p id="heroDescription" class="text-gray-600 mb-6 max-w-2xl"></p>

    <button onclick="scrollToSection('projects')"
      class="bg-[#2FA084] text-white px-6 py-2 rounded-lg hover:opacity-80">
      Experience & Projects
    </button>

  </div>
</section>

<!-- ABOUT -->
<section id="about" class="py-20 bg-white">
  <div class="max-w-6xl mx-auto px-4 grid md:grid-cols-2 gap-10 items-center">

    <div class="flex justify-center">
      <img id="aboutImage"
        src=""
        alt="About"
        class="w-[350px] md:w-[400px] rounded-2xl shadow-lg object-cover">
    </div>

    <div>
      <h3 class="text-3xl font-bold mb-6 text-[#2FA084]">About Me</h3>
      <div id="aboutText"></div>
    </div>

  </div>
</section>

<!-- EXPERIENCE & PROJECTS -->
<section id="projects" class="py-20">
  <h3 class="text-3xl font-bold text-center mb-10 text-[#2FA084]">Experience & Projects</h3>

  <div class="relative h-[560px] flex items-center justify-center overflow-hidden">
    <div id="slider" class="relative w-full h-full"></div>

    <button onclick="prevSlide()" class="absolute left-6 top-1/2 -translate-y-1/2 text-[#222] text-5xl font-bold hover:text-[#2FA084] transition">‹</button>
    <button onclick="nextSlide()" class="absolute right-6 top-1/2 -translate-y-1/2 text-[#222] text-5xl font-bold hover:text-[#2FA084] transition">›</button>
  </div>
</section>

<!-- ARTICLES -->
<section id="articles" class="py-20 bg-white">
  <h3 class="text-3xl font-bold text-center mb-10 text-[#2FA084]">Articles</h3>

  <div class="relative h-[560px] flex items-center justify-center overflow-hidden">
    <div id="articleSlider" class="relative w-full h-full"></div>

    <button onclick="prevArticle()" class="absolute left-6 top-1/2 -translate-y-1/2 text-[#222] text-5xl font-bold hover:text-[#2FA084] transition">‹</button>
    <button onclick="nextArticle()" class="absolute right-6 top-1/2 -translate-y-1/2 text-[#222] text-5xl font-bold hover:text-[#2FA084] transition">›</button>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-20 text-center">
  <h3 class="text-3xl font-bold mb-4 text-[#2FA084]">Contact & Social</h3>

  <p id="contactDescription" class="mb-10 text-gray-600"></p>

  <div id="contactLinks" class="flex flex-wrap justify-center gap-12 items-center"></div>
</section>

<script>
let items = [];
let articleItems = [];

let index = 0;
let articleIndex = 0;

function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

async function loadData() {
  try {
    const response = await fetch('data.json');

    if (!response.ok) {
      throw new Error('File data.json tidak ditemukan');
    }

    const data = await response.json();

    renderWebsite(data);
    updateSlider();
    updateArticleSlider();

    setInterval(nextSlide, 3000);
    setInterval(nextArticle, 3500);

  } catch (error) {
    console.error(error);
    alert('Gagal memuat data.json. Pastikan file data.json ada dan dibuka melalui Live Server.');
  }
}

function renderWebsite(data) {
  // PAGE
  document.title = data.site.title;
  document.getElementById('navbarTitle').textContent = data.site.navbarTitle;

  // HERO
  document.getElementById('heroImage').src = data.hero.image;
  document.getElementById('heroName').textContent = data.hero.name;
  document.getElementById('heroDescription').textContent = data.hero.description;

  // ABOUT
  document.getElementById('aboutImage').src = data.about.image;

  const aboutText = document.getElementById('aboutText');
  aboutText.innerHTML = '';

  data.about.paragraphs.forEach(paragraph => {
    const p = document.createElement('p');
    p.className = 'text-gray-600 mb-4 text-justify';
    p.textContent = paragraph;
    aboutText.appendChild(p);
  });

  // PROJECTS
  const slider = document.getElementById('slider');
  slider.innerHTML = '';

  data.projects.forEach(project => {
    const item = document.createElement('div');
    item.className = 'project-item w-[360px]';

    item.innerHTML = `
      <div class="text-center">
        <img src="${project.image}"
          class="w-full h-[250px] object-cover ${project.imagePosition} rounded-2xl mb-6 mx-auto shadow-lg"
          alt="${project.title}">
        <h4 class="font-bold text-2xl mb-3">${project.title}</h4>
        <p class="text-base text-gray-600 leading-relaxed">${project.description}</p>
      </div>
    `;

    slider.appendChild(item);
  });

  // ARTICLES
  const articleSlider = document.getElementById('articleSlider');
  articleSlider.innerHTML = '';

  data.articles.forEach(article => {
    const item = document.createElement('a');
    item.href = article.link;
    item.className = 'article-item w-[360px] block cursor-pointer';

    item.innerHTML = `
      <div class="text-center">
        <img src="${article.image}"
          class="w-full h-[250px] object-cover ${article.imagePosition} rounded-2xl mb-6 mx-auto shadow-lg"
          alt="${article.title}">
        <h4 class="font-bold text-2xl mb-3">${article.title}</h4>
        <p class="text-base text-gray-600 leading-relaxed">${article.description}</p>
      </div>
    `;

    articleSlider.appendChild(item);
  });

  // CONTACT
  document.getElementById('contactDescription').textContent = data.contact.description;

  const contactLinks = document.getElementById('contactLinks');
  contactLinks.innerHTML = '';

  data.contact.links.forEach(link => {
    const a = document.createElement('a');
    a.href = link.url;
    a.className = 'flex flex-col items-center gap-2 hover:scale-110 transition';

    if (link.newTab) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }

    a.innerHTML = `
      <img src="${link.icon}" class="w-10 h-10" alt="${link.label}">
      <span class="text-[#2FA084] text-sm">${link.label}</span>
    `;

    contactLinks.appendChild(a);
  });

  items = document.querySelectorAll('.project-item');
  articleItems = document.querySelectorAll('.article-item');
}

function updateSlider() {
  const total = items.length;

  items.forEach((item, i) => {
    item.style.opacity = "0";
    item.style.transform = "translate(-50%, -50%) scale(0.7)";
    item.style.zIndex = "0";

    if (i === index) {
      item.style.opacity = "1";
      item.style.transform = "translate(-50%, -50%) scale(1)";
      item.style.zIndex = "30";
    } else if (i === (index - 1 + total) % total) {
      item.style.opacity = "0.35";
      item.style.transform = "translate(-150%, -50%) scale(0.75)";
      item.style.zIndex = "10";
    } else if (i === (index + 1) % total) {
      item.style.opacity = "0.35";
      item.style.transform = "translate(50%, -50%) scale(0.75)";
      item.style.zIndex = "10";
    }
  });
}

function updateArticleSlider() {
  const total = articleItems.length;

  articleItems.forEach((item, i) => {
    item.style.opacity = "0";
    item.style.transform = "translate(-50%, -50%) scale(0.7)";
    item.style.zIndex = "0";
    item.style.pointerEvents = "none";

    if (i === articleIndex) {
      item.style.opacity = "1";
      item.style.transform = "translate(-50%, -50%) scale(1)";
      item.style.zIndex = "30";
      item.style.pointerEvents = "auto";
    } else if (i === (articleIndex - 1 + total) % total) {
      item.style.opacity = "0.35";
      item.style.transform = "translate(-150%, -50%) scale(0.75)";
      item.style.zIndex = "10";
      item.style.pointerEvents = "auto";
    } else if (i === (articleIndex + 1) % total) {
      item.style.opacity = "0.35";
      item.style.transform = "translate(50%, -50%) scale(0.75)";
      item.style.zIndex = "10";
      item.style.pointerEvents = "auto";
    }
  });
}

function nextSlide() {
  index = (index + 1) % items.length;
  updateSlider();
}

function prevSlide() {
  index = (index - 1 + items.length) % items.length;
  updateSlider();
}

function nextArticle() {
  articleIndex = (articleIndex + 1) % articleItems.length;
  updateArticleSlider();
}

function prevArticle() {
  articleIndex = (articleIndex - 1 + articleItems.length) % articleItems.length;
  updateArticleSlider();
}

loadData();
</script>

</body>
</html>
